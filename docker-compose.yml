services:
  postgres:
    image: postgres:17
    container_name: mobilekey-postgres
    environment:
      POSTGRES_DB: mobilekey
      POSTGRES_USER: mobilekey
      POSTGRES_PASSWORD: mobilekey
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mobilekey-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
