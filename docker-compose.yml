services:
  postgres:
    image: postgres:17
    container_name: mobilekey-postgres
    environment:
      POSTGRES_DB: mobilekey
      POSTGRES_USER: mobilekey
      POSTGRES_PASSWORD: mobilekey
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mobilekey-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: mobilekey-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mobilekey
      MINIO_ROOT_PASSWORD: mobilekey
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
