spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mobilekey
    username: mobilekey
    password: mobilekey
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jooq:
    sql-dialect: POSTGRES

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:my-super-secret-access-key-that-is-long-enough-for-hmac-sha256}
    refresh-secret: ${JWT_REFRESH_SECRET:my-super-secret-refresh-key-that-is-long-enough-for-hmac-sha256}
    access-expiration-ms: 900000       # 15 minutes
    refresh-expiration-ms: 2592000000  # 30 days
  password-reset:
    expiration-ms: 900000              # 15 minutes
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:mobilekey}
    secret-key: ${MINIO_SECRET_KEY:mobilekey}
    bucket: ${MINIO_BUCKET:mobilekey}
  file:
    max-size: 10485760                 # 10MB
    allowed-types:
      - image/jpeg
      - image/png
      - image/webp
    temp-expiration-hours: 5
    deleted-expiration-hours: 24
