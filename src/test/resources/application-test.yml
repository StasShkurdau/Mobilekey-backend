spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mobilekey_test
    username: mobilekey
    password: mobilekey
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

  jooq:
    sql-dialect: POSTGRES

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""

app:
  jwt:
    access-secret: test-access-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
    refresh-secret: test-refresh-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
    access-expiration-ms: 900000
    refresh-expiration-ms: 2592000000
  password-reset:
    expiration-ms: 900000
